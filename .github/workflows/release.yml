name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - run: bash setup.sh

      - run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Sign APK
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          storePassword: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version_name }}" != "" ]]; then
            echo "version=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: changelog
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## OpenCode for Android v${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Features" >> $GITHUB_OUTPUT
          echo "- AI coding assistant with tool calling" >> $GITHUB_OUTPUT
          echo "- File browser and code editor" >> $GITHUB_OUTPUT
          echo "- Multiple LLM providers (Gemini, GitHub Models, OpenAI, etc.)" >> $GITHUB_OUTPUT
          echo "- Web search, shell, git tools" >> $GITHUB_OUTPUT
          echo "- Project management" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Installation" >> $GITHUB_OUTPUT
          echo "Download the APK and install it on your Android device." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OpenCode for Android v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          make_latest: true
